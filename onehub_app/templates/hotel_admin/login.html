<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animation */
        @keyframes slideFade {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            width: 380px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 35px;
            color: #fff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            animation: slideFade 0.8s ease;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-card p {
            text-align: center;
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.25);
            color: #fff;
            font-size: 15px;
        }

        .input-group label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            font-size: 14px;
            color: #ddd;
            pointer-events: none;
            transition: 0.3s ease;
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: -8px;
            left: 10px;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: #fff;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .footer-text {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            opacity: 0.85;
        }

        .footer-text a {
            color: #ffd6e8;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 450px) {
            .login-card {
                width: 90%;
            }
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2>Hotel Admin Login</h2>
    <p>Manage your hotel dashboard securely</p>

    <form method="post">
        {% csrf_token %}

        <div class="input-group">
            <input type="email" name="email" required placeholder=" ">
            <label>Email Address</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" required placeholder=" ">
            <label>Password</label>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer-text">
        New hotel owner?
        <a href="{% url 'hotel_admin_register' %}">Register here</a>
    </div>
</div>

</body>
</html>
