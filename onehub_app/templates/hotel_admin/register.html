<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hotel Admin Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1d2671, #c33764);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animation */
        @keyframes slideFade {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-card {
            width: 420px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 18px;
            padding: 35px;
            color: #fff;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
            animation: slideFade 0.9s ease;
        }

        .register-card h2 {
            text-align: center;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .register-card p {
            text-align: center;
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            font-size: 15px;
        }

        .input-group label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            font-size: 14px;
            color: #ddd;
            pointer-events: none;
            transition: 0.3s ease;
        }

        .input-group input:focus+label,
        .input-group input:not(:placeholder-shown)+label {
            top: -8px;
            left: 10px;
            background: rgba(0, 0, 0, 0.35);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: #fff;
        }

        .register-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .footer-text {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
            opacity: 0.85;
        }

        .footer-text a {
            color: #ffd6e8;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .register-card {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <div class="register-card">
        <h2>Hotel Admin Registration</h2>
        <p>Create your hotel admin account</p>

        <form method="post">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" name="hotelowner" required placeholder=" ">
                <label>Owner Name</label>
            </div>

            <div class="input-group">
                <input type="text" name="hotelname" required placeholder=" ">
                <label>Hotel Name</label>
            </div>

            <div class="input-group">
                <input type="text" name="location" required placeholder=" ">
                <label>Hotel Location</label>
            </div>

            <div class="input-group">
                <input type="email" name="email" required placeholder=" ">
                <label>Email Address</label>
            </div>

            <div class="input-group">
                <input type="text" name="phone" required placeholder=" ">
                <label>Phone Number</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" required placeholder=" ">
                <label>Password</label>
            </div>

            <button type="submit" class="register-btn">Register</button>
        </form>

        <div class="footer-text">
            Already registered?
            <a href="{% url 'hotel_admin_login' %}">Login here</a>
        </div>
    </div>

</body>

</html>
